name: Deploy Frontend to EC2 via SSM

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Send deploy command (frontend)
        id: send
        run: |
          set -euo pipefail

          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          WORKDIR="${{ secrets.SSM_WORKING_DIR }}"

          if [ -z "$WORKDIR" ]; then WORKDIR="/opt/promora"; fi
          if [ -z "$INSTANCE_ID" ]; then
            echo "ERROR: EC2_INSTANCE_ID secret is missing/empty"
            exit 1
          fi

          echo "Using instance: $INSTANCE_ID"
          echo "Using workdir: $WORKDIR"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy frontend" \
            --parameters commands="cd $WORKDIR && chmod +x scripts/ci-deploy.sh && ./scripts/ci-deploy.sh frontend && docker compose ps" \
            --query "Command.CommandId" \
            --output text)

          if [ -z "$CMD_ID" ] || [ "$CMD_ID" = "None" ]; then
            echo "ERROR: No command id returned from send-command"
            exit 1
          fi

          echo "command_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "SSM CommandId: $CMD_ID"

      - name: Wait + print output
        run: |
          set -euo pipefail

          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          CMD_ID="${{ steps.send.outputs.command_id }}"

          echo "Waiting for SSM command to finish..."
          STATUS="Pending"

          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Status: $STATUS"

            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
              *) sleep 5 ;;
            esac
          done

          echo ""
          echo "===== STDOUT ====="
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text || true

          echo ""
          echo "===== STDERR ====="
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text || true

          if [ "$STATUS" != "Success" ]; then
            echo "ERROR: Deploy failed with status: $STATUS"
            exit 1
          fi
